[Settings]
# Name of the log file that will be created in the same directory as the script/executable.
LogFile = transactions.log

# Interval in seconds at which the script polls the serial device.
PollInterval = 2

# Delay in seconds before attempting to reconnect to the serial port if the connection is lost.
ReconnectDelay = 5

# Default baud rate for the serial connection if not specified by the --baud command-line argument.
DefaultBaudRate = 9600

[SerialPorts]
# Base name for serial ports on Unix-like systems (Linux, macOS).
# For example, if UnixBase = /dev/ttyUSB and you run --port 0, it will try /dev/ttyUSB0.
UnixBase = /dev/ttys

# Base name for serial ports on Windows.
# The script will append the number provided via the --port argument to this base.
# For example, if WindowsBase = COM and you run --port 3, it will try COM3.
WindowsBase = COM